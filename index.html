<!DOCTYPE html>
<html lang="pt-br">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BFTY86W2KM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-BFTY86W2KM");
  </script>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="galeria jacaré" />
  <meta property="og:description" content="a minha galeria de fotos personalizada contendo so as melhores fotos" />
  <meta property="og:image" content="https://jacaimages.vercel.app/imgs/logos/jacareimage.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="300" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:url" content="https://jacaimages.vercel.app" />
  <meta property="og:site_name" content="Jaca gallery" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@JacarezinXD" />
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaca images</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="./imgs/logos/jacareimage.png" type="image/x-icon" />
</head>
<body>

<header>
  <div class="header-left">
    <img class="header-img" src="./imgs/logos/jacareimage.png" alt="jacaré logo" />
    <h1 id="h1-header">Jaca gallery</h1>
  </div>
  <div class="header-right">
    <div class="search-wrapper">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="buscar imagem..." autocomplete="off" />
    </div>
    <span id="img-count">0 imagens</span>

    <!-- Ordenação -->
    <select id="sortSelect">
      <option value="default">ordem padrão</option>
      <option value="name-asc">nome A→Z</option>
      <option value="name-desc">nome Z→A</option>
      <option value="folder">pasta</option>
    </select>

    <!-- Modo de visualização -->
    <div class="view-toggle">
      <button class="view-btn active" id="btnGrid" title="Grid">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="0" y="0" width="7" height="7" rx="1"/><rect x="9" y="0" width="7" height="7" rx="1"/>
          <rect x="0" y="9" width="7" height="7" rx="1"/><rect x="9" y="9" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button class="view-btn" id="btnList" title="Lista">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="0" y="1" width="16" height="3" rx="1"/><rect x="0" y="7" width="16" height="3" rx="1"/>
          <rect x="0" y="13" width="16" height="3" rx="1"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-folder="all">tudo</button>
</div>

<main class="container-all">
  <div id="imgList"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <span>🐊</span>
    <p>nenhuma imagem encontrada</p>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-wrap">
    <div class="lb-img-container" id="lbImgContainer">
      <img id="lbImg" src="" alt="" />
    </div>
    <div class="lb-info">
      <span id="lbName"></span>
      <div class="lb-actions">
        <button class="lb-btn" id="lbCopy">copiar URL</button>
        <button class="lb-btn lb-btn-green" id="lbDownload">baixar</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">caminho copiado! ✓</div>

<footer>Jacaré trem bala 2022 🐊</footer>

<script src="./script.js"></script>
</body>
</html>
